<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login 2/6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/universal.css">
    </head>
  
    <body class="d-flex justify-content-center align-items-center vh-100;" style="padding: 15px 0">
    
    <div class="card" style="width: 350px; height: 550px; text-align: center;">
  <div class="card-body">
    <img src="../imagens/Bonequinhologin.png" width="40" class="mb-2">
    <h4 class="card-title bold">Criar Conta</h4>
    <p class="card-text fw-semibold">Comece sua jornada de aprendizado</p>
    <div class="mx-auto text-start" style="width: 95%;">

  <label class="mb-1">Nome completo:</label>
  <div class="input-group mb-2">
    <span class="input-group-text">
      <i class="bi bi-person"></i>
    </span>
    <input id="nome" class="form-control" placeholder="Insira seu nome completo">
  </div>

  <label class="mb-1">E-mail:</label>
  <div class="input-group mb-2">
    <span class="input-group-text">
      <i class="bi bi-envelope"></i>
    </span>
    <input id="email" class="form-control" type="email" placeholder="Insira seu E-mail">
  </div>

  <label class="mb-1">Senha:</label>
  <div class="input-group mb-2">
    <span class="input-group-text">
      <i class="bi bi-lock"></i>
    </span>
    <input id="senha" type="password" class="form-control" placeholder="Insira sua senha">
  </div>

  <label class="mb-1">Confirme sua senha:</label>
  <div class="input-group mb-3">
    <span class="input-group-text">
      <i class="bi bi-lock"></i>
    </span>
    <input id="confirmar" type="password" class="form-control" placeholder="Confirme sua senha">
  </div>

</div>
    
  <div id="areaContinuar" class="mt-3 text-center">

      <input 
        type="text" 
        id="outraInput" 
        class="form-control mb-2 d-none"
        placeholder="Digite a instituição">

      <button id="continuarBtn" class="btn btn-primary">
        Continuar
      </button>

  </div>
    </div>
      </div>
    </div>
    <script>
    document.getElementById("continuarBtn").addEventListener("click", () => {

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const confirmar = document.getElementById("confirmar").value;

    if (!nome || !email || !senha || !confirmar) {
        alert("Todos os campos devem ser preenchidos!");
        return;
    }

    if (senha !== confirmar) {
        alert("As senhas não coincidem!");
        return;
    }

    alert("Conta criada com sucesso!");

    window.location.href = "login.html";

    });
    </script>
      </body>
    </html>
</html>
