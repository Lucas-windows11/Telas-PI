<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch&Learn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/universal.css">
</head>

<body style="background-color: rgb(20, 20, 20); color: white;">

    <nav class="navbar navbar-dark bg-dark fixed-top" style="height: 60px !important; z-index: 3000 !important; border-bottom: 1px solid #333 !important; display: flex !important;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="../imagens/logoviagem.jpg" class="tamanho_imagem" style="height: 40px;">
            <span class="bold" style="color: white; font-size: 1.25rem;">Watch&Learn</span>
        </a>
        <div class="ms-auto">
            <a href="login.html" class="btn btn-sm btn-outline-danger">Sair</a>
        </div>
    </div>
</nav>

<div class="fixed-top d-flex align-items-center" style="top: 60px !important; height: 50px !important; z-index: 2000 !important; visibility: visible !important; display: flex !important;">
    <div class="container-fluid">
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-primary">Todos</button>
            <button class="btn btn-sm btn-secondary text-white">Séries</button>
            <button class="btn btn-sm btn-secondary text-white">Filmes</button>
        </div>
    </div>
</div>

<div class="fixed-top d-flex align-items-center" style="top: 110px !important; height: 50px !important; z-index: 1000 !important; visibility: visible !important; display: flex !important;">
    <div class="container-fluid">
        <div class="d-flex gap-2 align-items-center">
            <button class="btn btn-sm btn-secondary text-white btn-xs">Todas as idades</button>
            <button class="btn btn-sm btn-warning text-dark btn-xs bold">Criança</button>
            <button class="btn btn-sm btn-info text-dark btn-xs bold">Adolescente</button>
        </div>
    </div>
</div>

    <main style="padding-top: 170px;">
    <div class="container">
        <h2 class="mb-4 bold text-white">Filmes em Destaque</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <a href="destino1.html">
                    <img src="../imagens/fabrica.png" class="img-fluid rounded shadow" alt="Fábrica de Chocolate">
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="destino2.html">
                    <img src="../imagens/sonic.png" class="img-fluid rounded shadow" alt="Sonic">
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="destino3.html">
                    <img src="../imagens/incriveis.jpeg" class="img-fluid rounded shadow" alt="Incríveis">
                </a>
            </div>
        </div>

        <h2 class="mt-4 mb-4 bold text-white">Filmes Disponíveis</h2>
        <div class="row">
            <div class="col-12">
                <div id="carrosselFilmes" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        
                        <div class="carousel-item active" data-bs-interval="3000">
                            <div class="d-flex justify-content-center gap-3">
                                <img src="../imagens/pequenosspy.jpg" class="rounded" style="height: 250px; width: 170px; object-fit: cover;">
                                <img src="../imagens/sharkboylava.png" class="rounded" style="height: 250px; width: 170px; object-fit: cover;">
                                <img src="../imagens/minecraft.jpg" class="rounded d-none d-md-block" style="height: 250px; width: 170px; object-fit: cover;">
                            </div>
                        </div>

                        <div class="carousel-item" data-bs-interval="3000">
                            <div class="d-flex justify-content-center gap-3">
                                <img src="../imagens/batima.jpg" class="rounded" style="height: 250px; width: 170px; object-fit: cover;">
                                <img src="../imagens/avengers.jpg" class="rounded" style="height: 250px; width: 170px; object-fit: cover;">
                                <img src="../imagens/woody.jpg" class="rounded d-none d-md-block" style="height: 250px; width: 170px; object-fit: cover;">
                            </div>
                        </div>

                    </div>

                    <button class="carousel-control-prev" type="button" data-bs-target="#carrosselFilmes" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carrosselFilmes" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>
                </div>
            </div>
        </div>
    </div> </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
